server:
  port: 8093

spring:
  application:
    name: order-service
  # 需要注册中心时取消注释并启动 Nacos
  #  cloud:
  #    nacos:
  #      discovery:
  #        server-addr: 127.0.0.1:8848
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/order?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&autoReconnect=true&useSSL=false&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      validation-query: SELECT 1
      test-while-idle: true
  Kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      properties:
        enable.idempotence: true

logging:
  config: classpath:logback-spring.xml
  file:
    path: /Users/sx/Documents/workSpace/didi-taxi/order/logs/order-service

management:
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        enabled: false
  zipkin:
    tracing:
      endpoint: http://127.0.0.1:9411/api/v2/spans

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath*:mapper/**/*.xml

# 待派单（CREATED）超时：仅由定时任务系统取消，不依赖乘客轮询
order:
  dispatch:
    wait-timeout-seconds: 180
    timeout-scan-interval-ms: 30000

# XXL-JOB 执行器：需独立部署 xxl-job-admin，版本需与根 pom 中 xxl.job.version 对齐
xxl:
  job:
    enabled: true
    access-token: ${XXL_JOB_ACCESS_TOKEN:default_token}
    admin:
      addresses: http://127.0.0.1:8080/xxl-job-admin
    executor:
      app name: order-executor
      address: ${XXL_JOB_EXECUTOR_ADDRESS:http://127.0.0.1:9998}
      port: 9998
      log-path: ./logs/xxl-job
      log-retention-days: 7

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.sx.order.dao: DEBUG

---
spring:
  config:
    activate:
      on-profile: local

logging:
  level:
    com.sx.order.dao: DEBUG
