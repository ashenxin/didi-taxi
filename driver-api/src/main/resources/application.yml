server:
  port: 8101

# 经网关访问时不要开 BFF 自带 CORS（勿设 bff.browser-cors.enabled），与《网关服务_设计》一致。
# 仅浏览器直连本端口 8101 排障：bff.browser-cors.enabled=true

spring:
  application:
    name: driver-api
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}

app:
  jwt:
    # 与网关 gateway.jwt.secret-driver 保持一致（生产用 JWT_SECRET_DRIVER）
    secret: ${JWT_SECRET_DRIVER:${JWT_SECRET:dev-didi-driver-jwt-secret-change-me-32b!!}}
    # 自然过期 8h（与 Redis token_version 登出作废独立）
    expiration-seconds: 28800
    audience: driver-bff

logging:
  config: classpath:logback-spring.xml
  file:
    path: /Users/sx/Documents/workSpace/didi-taxi/driver-api/logs/driver-api

management:
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        enabled: false
  zipkin:
    tracing:
      endpoint: http://127.0.0.1:9411/api/v2/spans

services:
  order:
    base-url: http://127.0.0.1:8093
  passenger:
    base-url: http://127.0.0.1:8092
  capacity:
    base-url: http://127.0.0.1:8090
  calculate:
    base-url: http://127.0.0.1:8091
