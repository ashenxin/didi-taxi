server:
  port: 8092

spring:
  application:
    name: passenger-service
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/passenger?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&autoReconnect=true&useSSL=false&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      validation-query: SELECT 1
      test-while-idle: true

logging:
  config: classpath:logback-spring.xml
  file:
    path: /Users/sx/Documents/workSpace/didi-taxi/passenger/logs/passenger-service

management:
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        enabled: false
  zipkin:
    tracing:
      endpoint: http://127.0.0.1:9411/api/v2/spans

passenger:
  admin:
    # 须与 admin-api 的 admin.security-context-cache.key-prefix 一致
    security-context-cache:
      key-prefix: ${ADMIN_SECURITY_CONTEXT_CACHE_KEY_PREFIX:adm:user:}
  app:
    customer-auth:
      sms:
        code-ttl-seconds: 300
        min-interval-seconds: 60
        daily-limit-per-phone: 5
        daily-login-fail-limit-per-phone: 5
        # 生产设为 false 并接入短信网关；true 时仅在日志打印验证码
        mock-send-enabled: ${APP_SMS_MOCK_ENABLED:true}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath*:mapper/**/*.xml

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.sx.passenger.dao: DEBUG

---
spring:
  config:
    activate:
      on-profile: local

logging:
  level:
    com.sx.passenger.dao: DEBUG
