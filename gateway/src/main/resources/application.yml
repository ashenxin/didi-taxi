server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: admin-bff
          uri: http://127.0.0.1:8099
          predicates:
            - Path=/admin/**
        - id: passenger-bff
          uri: http://127.0.0.1:8100
          predicates:
            - Path=/app/**
        - id: driver-bff
          uri: http://127.0.0.1:8101
          predicates:
            - Path=/driver/**
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - 'http://localhost:*'
              - 'http://127.0.0.1:*'
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: '*'
            allowCredentials: false
            maxAge: 3600

# 与 admin-api admin.jwt.secret 保持一致（生产用 JWT_SECRET）
gateway:
  jwt:
    # 本地 Postman / 前端无 token 联调时可设 false（或环境变量 GATEWAY_JWT_REQUIRE_AUTH=false）；生产必须为 true
    require-auth: ${GATEWAY_JWT_REQUIRE_AUTH:true}
    secret: ${JWT_SECRET:dev-didi-admin-jwt-secret-change-me-32b!!}
    audience-check-enabled: true
    audience-admin: admin-bff
    audience-app: app-bff
    audience-driver: driver-bff

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
