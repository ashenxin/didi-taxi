server:
  port: 8100

# 经网关访问时不要开 BFF 自带 CORS（勿设 bff.browser-cors.enabled），与《网关服务_设计》一致。
# 仅浏览器直连本端口 8100 排障：bff.browser-cors.enabled=true

spring:
  application:
    name: passenger-api

app:
  jwt:
    # 与网关 gateway.jwt.secret-app 保持一致（生产用 JWT_SECRET_APP）
    secret: ${JWT_SECRET_APP:${JWT_SECRET:dev-didi-app-jwt-secret-change-me-32b!!}}
    expiration-seconds: 604800
    audience: app-bff

logging:
  config: classpath:logback-spring.xml
  file:
    path: /Users/sx/Documents/workSpace/didi-taxi/passenger-api/logs/passenger-api

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://127.0.0.1:9411/api/v2/spans

services:
  order:
    base-url: http://127.0.0.1:8093
  passenger:
    base-url: http://127.0.0.1:8092
  capacity:
    base-url: http://127.0.0.1:8090
  calculate:
    base-url: http://127.0.0.1:8091
  map:
    base-url: http://127.0.0.1:8094
