server:
  port: 8090

spring:
  application:
    name: capacity-service
  # 与 sx_work 一致：需要注册中心时取消注释并启动 Nacos
  #  cloud:
  #    nacos:
  #      discovery:
  #        server-addr: 127.0.0.1:8848
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/capacity?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&autoReconnect=true&useSSL=false&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      validation-query: SELECT 1
      test-while-idle: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}

logging:
  config: classpath:logback-spring.xml
  file:
    path: /Users/sx/Documents/workSpace/didi-taxi/capacity/logs/capacity-service

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath*:mapper/**/*.xml

services:
  order:
    base-url: ${ORDER_SERVICE_BASE_URL:http://127.0.0.1:8093}

capacity:
  dispatch:
    # 司机与上车点直线距离上限（米），与《乘客司机端_Redis与听单下线策略》一致
    match-radius-meters: 3000
    driver-geo-ttl-seconds: 600
    driver-offer-seconds: 10
    # 自测：指定司机上线时强制写入 GEO 的坐标（与 passenger-demo 东站起点一致，避免本机定位超 3km / 非最近邻）；生产请删除或置空
    geo-pin:
      80004:
        lat: 30.2525
        lng: 120.2156
  app:
    driver-auth:
      code-ttl-seconds: 300
      min-interval-seconds: 60
      daily-sms-limit-per-phone: 5
      daily-login-fail-limit-per-phone: 5
      mock-send-enabled: true

---
# 非生产：打印 MyBatis SQL（--spring.profiles.active=dev）
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.sx.capacity.dao: DEBUG

---
# 非生产：与 dev 相同（IDE 常用 --spring.profiles.active=local）
spring:
  config:
    activate:
      on-profile: local

logging:
  level:
    com.sx.capacity.dao: DEBUG
