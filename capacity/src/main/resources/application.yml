server:
  port: 8090

spring:
  application:
    name: capacity-service
  # 与 sx_work 一致：需要注册中心时取消注释并启动 Nacos
  #  cloud:
  #    nacos:
  #      discovery:
  #        server-addr: 127.0.0.1:8848
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/capacity?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&autoReconnect=true&useSSL=false&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      validation-query: SELECT 1
      test-while-idle: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: capacity.order.dispatch.requested.v1
      enable-auto-commit: false
      auto-offset-reset: earliest
    listener:
      ack-mode: manual

logging:
  config: classpath:logback-spring.xml
  file:
    path: /Users/sx/Documents/workSpace/didi-taxi/capacity/logs/capacity-service

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath*:mapper/**/*.xml

services:
  order:
    base-url: ${ORDER_SERVICE_BASE_URL:http://127.0.0.1:8093}

capacity:
  dispatch:
    # 司机与上车点直线距离上限（米），与《乘客司机端_Redis与听单下线策略》一致
    match-radius-meters: 3000
    # 听单会话内 Redis GEO 点存活：过短会导致「库表仍听单但池里没人」；30min 与一次出车会话更匹配
    driver-geo-ttl-seconds: 1800
    # 司机确认接单窗口（秒）：10s 过易误杀；30s 兼顾体验与改派节奏
    driver-offer-seconds: 30
    # 迟滞匹配兜底：Kafka/首轮未命中时不宜等 30s 才捞 CREATED
    late-match-scan-interval-ms: 15000
    late-match-batch-limit: 50
    # offer 超时打回 ASSIGNED 后：再开窗 / GEO 改派（宜 ≤ 确认窗，略快于迟滞兜底）
    offer-reschedule:
      scan-interval-ms: 5000
      batch-limit: 50
      # 同一司机连续 offer 轮次上限（未满则再开窗口，否则 GEO 改派）
      same-driver-max-offer-rounds: 2
    # 自测：指定司机上线时强制写入 GEO 的坐标（与 passenger-demo 东站起点一致，避免本机定位超 3km / 非最近邻）；生产请删除或置空
    geo-pin:
      900006:
        lat: 30.2525
        lng: 120.2156
  app:
    driver-auth:
      code-ttl-seconds: 300
      min-interval-seconds: 60
      daily-sms-limit-per-phone: 5
      daily-login-fail-limit-per-phone: 5
      mock-send-enabled: true

# XXL-JOB 执行器：需独立部署 xxl-job-admin，版本需与根 pom 中 xxl.job.version 对齐
xxl:
  job:
    enabled: true
    access-token: ${XXL_JOB_ACCESS_TOKEN:default_token}
    admin:
      addresses: http://127.0.0.1:8080/xxl-job-admin
    executor:
      app name: capacity-executor
      address: ${XXL_JOB_EXECUTOR_ADDRESS:http://127.0.0.1:9999}
      port: 9999
      log-path: ./logs/xxl-job
      log-retention-days: 7

---
# 非生产：打印 MyBatis SQL（--spring.profiles.active=dev）
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.sx.capacity.dao: DEBUG

---
# 非生产：与 dev 相同（IDE 常用 --spring.profiles.active=local）
spring:
  config:
    activate:
      on-profile: local

logging:
  level:
    com.sx.capacity.dao: DEBUG
