spring:
  datasource:
    url: jdbc:h2:mem:capacity_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

# 单测不启动 xxl 执行器
xxl:
  job:
    enabled: false
